# Pre-commit validation pipeline for genie-team
# Organized by determinism tier (most deterministic → least)
# Docs: docs/archive/quality-enforcement/2026-02-11_precommit-validation-pipeline/
# NOTE: Shellcheck exclusions also defined in Makefile (canonical source for CI). Keep in sync.

repos:
  # Tier 1: Standard linters
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^docs/
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-e, SC1091, -e, SC2034, -e, SC2155, -e, SC2015, -e, SC2317, -e, SC1090]
        exclude: ^tests/fixtures/

  # Tier 1-3: Custom local hooks
  - repo: local
    hooks:
      # Tier 1: YAML frontmatter syntax
      - id: lint-frontmatter-yaml
        name: Lint YAML frontmatter
        entry: scripts/validate/lint-frontmatter-yaml.sh
        language: script
        files: ^docs/.*\.md$
        exclude: ^docs/archive/
        types: [markdown]

      # Tier 2: Frontmatter schema validation
      - id: validate-frontmatter
        name: Validate frontmatter schema
        entry: scripts/validate/validate-frontmatter.sh
        language: script
        files: ^docs/.*\.md$
        exclude: ^docs/archive/
        types: [markdown]

      # Tier 3: Cross-reference integrity
      - id: check-crossrefs
        name: Check cross-references
        entry: scripts/validate/check-crossrefs.sh
        language: script
        files: ^docs/.*\.md$
        exclude: ^docs/archive/
        types: [markdown]

      # Tier 4: Source/installed copy sync (DISABLED — run install.sh --sync first)
      # Uncomment after syncing: install.sh project --sync
      # - id: check-source-sync
      #   name: Check source/installed sync
      #   entry: scripts/validate/check-source-sync.sh
      #   language: script
      #   files: \.(md|sh)$
