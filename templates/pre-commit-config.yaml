# Generated by genie-team install.sh prehook — customize as needed
# Pre-commit validation pipeline organized by determinism tier
# See: https://pre-commit.com

repos:
  # Tier 1: Standard linters
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-json
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^docs/
      - id: end-of-file-fixer
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-e, SC1091]

  # Tier 1-3: genie-team custom hooks
  - repo: local
    hooks:
      # Tier 1: YAML frontmatter syntax
      - id: lint-frontmatter-yaml
        name: Lint YAML frontmatter
        entry: scripts/validate/lint-frontmatter-yaml.sh
        language: script
        files: ^docs/.*\.md$
        types: [markdown]

      # Tier 2: Frontmatter schema validation
      - id: validate-frontmatter
        name: Validate frontmatter schema
        entry: scripts/validate/validate-frontmatter.sh
        language: script
        files: ^docs/.*\.md$
        types: [markdown]

      # Tier 3: Cross-reference integrity
      - id: check-crossrefs
        name: Check cross-references
        entry: scripts/validate/check-crossrefs.sh
        language: script
        files: ^docs/.*\.md$
        types: [markdown]

      # Tier 4: Source/installed copy sync (DISABLED by default)
      # Uncomment and configure SYNC_MAP in check-source-sync.sh for your project
      # - id: check-source-sync
      #   name: Check source/installed sync
      #   entry: scripts/validate/check-source-sync.sh
      #   language: script
      #   files: \.(md|sh)$
